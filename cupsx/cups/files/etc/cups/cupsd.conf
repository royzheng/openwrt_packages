########################################################################
#                                                                      #
# This is the CUPS configuration file.  If you are familiar with       #
# Apache or any of the other popular web servers, we've followed the   #
# same format.  Any configuration variable used here has the same      #
# semantics as the corresponding variable in Apache.  If we need       #
# different functionality then a different name is used to avoid       #
# confusion...                                                         #
#                                                                      #
########################################################################


AccessLog syslog
ErrorLog syslog
LogLevel info
PageLog syslog
PageLogFormat
PreserveJobHistory No
PreserveJobFiles No
AutoPurgeJobs Yes
MaxJobs 25
MaxPrinterHistory 10
ErrorPolicy retry-job
#Printcap /etc/printcap
#PrintcapFormat BSD
RequestRoot /var/cups
#RemoteRoot remroot
#User nobody
#Group nogroup
# root permissions required to make cups work with the usb backend
User root
Group root
RIPCache auto
TempDir /var/cups
Port 631
HostNameLookups On
KeepAlive On
# DNS-SD publishing is handled by cups-airprint-update and Avahi
# static service files. Keep CUPS browsing enabled for shared queues.
Browsing Yes
BrowseWebIF Yes
BrowseLocalProtocols dnssd
DefaultShared Yes
DefaultEncryption Never
WebInterface Yes
Listen /var/run/cups/cups.sock

ServerAlias *

<Location />
Order Allow,Deny
Allow From 127.0.0.1
#Allow From 192.168.1.0/24
Allow all
</Location>

<Location /admin>
AuthType Basic
AuthClass System
Order Allow,Deny
Allow From 127.0.0.1
#Allow From 192.168.1.0/24
Allow all
</Location>

<Location /admin/conf>
AuthType Basic
AuthClass System
Order Allow,Deny
Allow From 127.0.0.1
#Allow From 192.168.1.0/24
Allow all
</Location>
